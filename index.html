<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I'm Sorry 🥺</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<!-- Night Sky -->
<div class="night-sky">
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>
</div>

<!-- Shooting Stars -->
<div class="shooting-stars">
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
</div>

<!-- Moon -->
<div class="moon">🌙</div>

<!-- Apology Box -->
<div class="container">

<div class="emoji">🥺🙏</div>

<h1>I'm Really Sorry</h1>

<p>
Hey... I am really sorry Jasspreet😔 <br>
Because of me you got late going home today. <br>
I didn't mean to cause any trouble.
</p>

<div class="buttons">

<button class="yes">Okay I Forgive 😊</button>

<button class="no" id="noBtn">No 😒</button>

</div>

<p id="response"></p>

</div>

<script src="script.js"></script>

</body>
</html>
